services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ferreteria_db}
      MYSQL_USER: ${DB_USER:-ferreteria}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ferreteria_db.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./datos_base.sql:/docker-entrypoint-initdb.d/02_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ferreteria_db}
      DB_USER: ${DB_USER:-ferreteria}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - server

volumes:
  mysql_data:
  uploads:
